<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klarblick Finanzen</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f7fb;
}

.hero{
    background:linear-gradient(135deg,#3767d8,#61b6a8);
    color:white;
    text-align:center;
    padding:80px 20px;
}

.hero h1{
    font-size:60px;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:30px;
}

.card{
    background:white;
    padding:30px;
    border-radius:20px;
    margin-bottom:20px;
    box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:10px;
    margin-bottom:10px;
}

button{
    background:#3767d8;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    background:#284fb3;
}

.ergebnis{
    background:#e8f7ef;
    padding:20px;
    border-radius:15px;
    margin-top:20px;
}

.gruen{
    color:#2ca36a;
    font-size:42px;
    font-weight:bold;
}

</style>
</head>

<body>

<section class="hero">
    <h1>Klarblick Finanzen</h1>

    <p>
        Schulden können jeden treffen.
        Du musst dich nicht schämen.
    </p>
</section>

<div class="container">

<div class="card">
<h2>Monatliches Einkommen</h2>
<input type="number" id="einkommen" placeholder="2400">
</div>

<div class="card">

<h2>Regelmäßige Ausgaben</h2>

<input type="number" class="fix" placeholder="Miete">
<input type="number" class="fix" placeholder="Handy">
<input type="number" class="fix" placeholder="Kredit">
<input type="number" class="fix" placeholder="Netflix">
<input type="number" class="fix" placeholder="Sonstige Kosten">

</div>

<div class="card">

<h2>Alltägliche Ausgaben</h2>

<input type="number" class="variabel" placeholder="Lebensmittel">
<input type="number" class="variabel" placeholder="Tanken">
<input type="number" class="variabel" placeholder="Freizeit">

</div>

<div class="card">

<button onclick="berechnen()">
Budget berechnen
</button>

<div id="ergebnis"></div>

</div>

</div>

<script>

function berechnen(){

let einkommen =
parseFloat(
document.getElementById("einkommen").value
) || 0;

let fixkosten = 0;

document.querySelectorAll(".fix")
.forEach(function(feld){

fixkosten += parseFloat(feld.value) || 0;

});

let variable = 0;

document.querySelectorAll(".variabel")
.forEach(function(feld){

variable += parseFloat(feld.value) || 0;

});

let verfuegbar =
einkommen - fixkosten - variable;

document.getElementById("ergebnis").innerHTML = `

<div class="ergebnis">

<h2>Deine Übersicht</h2>

<p><strong>Einkommen:</strong> ${einkommen.toFixed(2)} €</p>

<p><strong>Regelmäßige Ausgaben:</strong> ${fixkosten.toFixed(2)} €</p>

<p><strong>Alltägliche Ausgaben:</strong> ${variable.toFixed(2)} €</p>

<hr>

<p>Monatlich verfügbar:</p>

<div class="gruen">
${verfuegbar.toFixed(2)} €
</div>

<p>
Du hast den wichtigsten Schritt geschafft:
Du hast dir einen Überblick verschafft.
</p>

</div>

`;

}

</script>

</body>
</html>
