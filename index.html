<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klarblick Finanzen</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f7fb;
}

.hero{
    background:linear-gradient(135deg,#3767d8,#61b6a8);
    color:white;
    text-align:center;
    padding:70px 20px;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:25px;
}

.card{
    background:white;
    padding:25px;
    border-radius:20px;
    margin-bottom:20px;
    box-shadow:0 3px 12px rgba(0,0,0,0.1);
}

input{
    padding:12px;
    border:1px solid #ccc;
    border-radius:10px;
}

.einkommen{
    width:100%;
}

.zeile{
    display:grid;
    grid-template-columns:2fr 1fr auto;
    gap:10px;
    margin-bottom:10px;
}

.name{
    width:100%;
}

.betrag{
    width:100%;
}

button{
    border:none;
    border-radius:10px;
    padding:12px 16px;
    cursor:pointer;
    background:#3767d8;
    color:white;
}

button:hover{
    opacity:0.9;
}

.loeschen{
    background:#d9534f;
}

.button-row{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.ergebnis{
    background:#e8f7ef;
    border-radius:15px;
    padding:20px;
}

.gruen{
    color:#2ca36a;
    font-size:40px;
    font-weight:bold;
}

.rot{
    color:#d9534f;
    font-size:40px;
    font-weight:bold;
}
</style>
</head>

<body>

<section class="hero">
<h1>Klarblick Finanzen</h1>

<p>
Schulden können jeden treffen.
Du musst dich nicht schämen.
Der erste Schritt ist Überblick.
</p>
</section>

<div class="container">

<div class="card">

<h2>Monatliches Einkommen</h2>

<input
class="einkommen"
id="einkommen"
type="number"
placeholder="z.B. 2400">

</div>

<div class="card">

<h2>Ausgaben</h2>

<div id="ausgaben"></div>

<button onclick="neueAusgabe()">
+ Ausgabe hinzufügen
</button>

</div>

<div class="card">

<div class="button-row">

<button onclick="berechnen()">
Budget berechnen
</button>

<button onclick="speichern()">
💾 Speichern
</button>

<button onclick="laden()">
📂 Laden
</button>

<button onclick="allesLoeschen()">
🗑 Löschen
</button>

</div>

<div id="ergebnis"></div>

</div>

</div>

<script>

function neueAusgabe(){

const div = document.createElement("div");

div.className = "zeile";

div.innerHTML = `
<input class="name" placeholder="z.B. Miete, Kredit, Netflix">
<input class="betrag" type="number" step="0.01" placeholder="Betrag">
<button class="loeschen" onclick="this.parentElement.remove()">🗑</button>
`;

document.getElementById("ausgaben")
.appendChild(div);

}

function berechnen(){

let einkommen =
parseFloat(
document.getElementById("einkommen").value
) || 0;

let ausgaben = 0;

document
.querySelectorAll(".betrag")
.forEach(feld => {

ausgaben +=
parseFloat(feld.value) || 0;

});

let verfuegbar =
einkommen - ausgaben;

let klasse =
verfuegbar >= 0 ? "gruen" : "rot";

document.getElementById("ergebnis").innerHTML = `

<div class="ergebnis">

<h2>Deine Übersicht</h2>

<p><strong>Einkommen:</strong>
${einkommen.toFixed(2)} €</p>

<p><strong>Gesamtausgaben:</strong>
${ausgaben.toFixed(2)} €</p>

<hr>

<p>Monatlich verfügbar:</p>

<div class="${klasse}">
${verfuegbar.toFixed(2)} €
</div>

<p>
Du hast den wichtigsten Schritt geschafft:
Du kennst deine Zahlen.
</p>

</div>
`;

}

function speichern(){

const daten = {

einkommen:
document.getElementById("einkommen").value,

ausgaben:[]
};

document
.querySelectorAll(".zeile")
.forEach(zeile=>{

daten.ausgaben.push({

name:
zeile.querySelector(".name").value,

betrag:
zeile.querySelector(".betrag").value

});

});

localStorage.setItem(
"klarblickDaten",
JSON.stringify(daten)
);

alert("Daten gespeichert");
}

function laden(){

const daten =
JSON.parse(
localStorage.getItem("klarblickDaten")
);

if(!daten){
return;
}

document.getElementById("einkommen").value =
daten.einkommen;

document.getElementById("ausgaben").innerHTML = "";

daten.ausgaben.forEach(eintrag=>{

neueAusgabe();

const zeilen =
document.querySelectorAll(".zeile");

const letzte =
zeilen[zeilen.length-1];

letzte.querySelector(".name").value =
eintrag.name;

letzte.querySelector(".betrag").value =
eintrag.betrag;

});

}

function allesLoeschen(){

localStorage.removeItem("klarblickDaten");

document.getElementById("einkommen").value="";

document.getElementById("ausgaben").innerHTML="";

document.getElementById("ergebnis").innerHTML="";

neueAusgabe();

alert("Daten gelöscht");
}

laden();

if(document.querySelectorAll(".zeile").length===0){
neueAusgabe();
}

</script>

</body>
</html>
`
