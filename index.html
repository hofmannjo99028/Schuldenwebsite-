<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klarblick Finanzen</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f7fb;
}

.hero{
    background:linear-gradient(135deg,#3767d8,#61b6a8);
    color:white;
    text-align:center;
    padding:80px 20px;
}

.hero h1{
    font-size:60px;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:30px;
}

.card{
    background:white;
    border-radius:20px;
    padding:30px;
    margin-bottom:25px;
    box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

h2{
    color:#3767d8;
}

input{
    padding:12px;
    border:1px solid #ccc;
    border-radius:10px;
}

.einkommen{
    width:100%;
}

.zeile{
    display:grid;
    grid-template-columns:2fr 1fr auto;
    gap:10px;
    margin-bottom:10px;
}

.name{
    width:100%;
}

.betrag{
    width:100%;
}

button{
    background:#3767d8;
    color:white;
    border:none;
    border-radius:10px;
    padding:12px 18px;
    cursor:pointer;
}

.button-row{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.loeschen{
    background:#d9534f;
}

.ergebnis{
    background:#e8f7ef;
    border-radius:15px;
    padding:20px;
    margin-top:20px;
}

.geld{
    font-size:42px;
    color:#2ca36a;
    font-weight:bold;
}

.negativ{
    color:#d9534f;
}

</style>
</head>

<body>

<section class="hero">

<h1>Klarblick Finanzen</h1>

<p>
Schulden können jeden treffen.
Du musst dich nicht schämen.
Der erste Schritt ist Überblick.
</p>

</section>

<div class="container">

<div class="card">

<h2>Monatliches Einkommen</h2>

<input
class="einkommen"
type="number"
id="einkommen"
placeholder="z.B. 2400">

</div>

<div class="card">

<h2>Ausgaben</h2>

<div id="ausgaben"></div>

<div class="button-row">

<button onclick="neueAusgabe()">
+ Ausgabe hinzufügen
</button>

</div>

</div>

<div class="card">

<button onclick="berechnen()">
Budget berechnen
</button>

<div id="ergebnis"></div>

</div>

</div>

<script>

function neueAusgabe(){

const container =
document.getElementById("ausgaben");

const zeile =
document.createElement("div");

zeile.className = "zeile";

zeile.innerHTML = `
<input
class="name"
placeholder="z.B. Miete, Netflix, Kredit, Versicherung">

<input
class="betrag"
type="number"
step="0.01"
placeholder="Betrag">

<button
class="loeschen"
onclick="this.parentElement.remove()">
🗑
</button>
`;

container.appendChild(zeile);

}

function berechnen(){

let einkommen =
parseFloat(
document.getElementById("einkommen").value
) || 0;

let ausgaben = 0;

document
.querySelectorAll(".betrag")
.forEach(feld => {

ausgaben +=
parseFloat(feld.value) || 0;

});

let verfuegbar =
einkommen - ausgaben;

let farbe =
verfuegbar >= 0
? "geld"
: "geld negativ";

document.getElementById("ergebnis").innerHTML = `

<div class="ergebnis">

<h2>Deine Übersicht</h2>

<p><strong>Einkommen:</strong>
${einkommen.toFixed(2)} €</p>

<p><strong>Gesamtausgaben:</strong>
${ausgaben.toFixed(2)} €</p>

<hr>

<p>Monatlich verfügbar:</p>

<div class="${farbe}">
${verfuegbar.toFixed(2)} €
</div>

<p>
Du hast den wichtigsten Schritt bereits geschafft:
Du kennst deine Zahlen.
</p>

<p>
In 12 Monaten entspräche das:
<strong>${(verfuegbar*12).toFixed(2)} €</strong>
</p>

</div>

`;

}

neueAusgabe();

</script>

</body>
</html>
